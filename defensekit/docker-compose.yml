services:
  defensekit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: defensekit:latest
    container_name: defensekit
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DK_SERVE: "true"
      DK_ADDR: ":8080"
      DK_THREADS: "150"
      DK_TIMEOUT: "3"
      DK_RATE: "200"
      DK_VERBOSE: "false"
      DK_SILENT: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/defensekit", "-healthcheck", "-health-url", "http://127.0.0.1:8080/api/health", "-silent"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
