<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{.Title}}</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-soft: #1a2640;
      --text: #e8edff;
      --muted: #9cb0df;
      --accent: #4f8cff;
      --accent-hover: #78a5ff;
      --border: #2d3b5d;
      --ok: #27c093;
      --error: #ff6b6b;
      --warn-bg: #3b2e0a;
      --warn-border: #705615;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 22px;
      font-family: "Segoe UI", Inter, Arial, sans-serif;
      background: radial-gradient(circle at top, #152240 0, var(--bg) 45%);
      color: var(--text);
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
    }
    h1 { margin: 0; font-size: 36px; }
    .sub { margin: 8px 0 16px; color: var(--muted); }
    .warn {
      margin: 0 0 16px;
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: 10px;
      padding: 12px;
      color: #ffd89d;
    }
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
    input, select {
      width: 100%;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      padding: 0 10px;
    }
    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      height: 40px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      padding: 0 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button.secondary { background: #33466f; }
    .list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.6;
    }
    .status {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }
    .result {
      margin-top: 14px;
      background: #081126;
      border: 1px solid #1c3058;
      border-radius: 10px;
      overflow: auto;
      min-height: 260px;
    }
    pre { margin: 0; padding: 14px; color: #d8e6ff; font-size: 13px; }
    .ok { color: var(--ok); }
    .error { color: var(--error); }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>{{.Title}}</h1>
      <div class="sub">Plugin-enabled defensive toolkit with live updates</div>
      <div class="warn">{{.Warning}}</div>

      <div class="grid">
        <div>
          <div class="controls">
            <div>
              <label for="target">Target</label>
              <input id="target" value="example.com" />
            </div>
            <div>
              <label for="plugin">Plugin</label>
              <select id="plugin"></select>
            </div>
            <div>
              <label for="password">Password (optional)</label>
              <input id="password" type="password" placeholder="Used by password plugin" />
            </div>
            <div>
              <label for="timeout">Timeout (sec)</label>
              <input id="timeout" type="number" value="3" min="1" max="30" />
            </div>
          </div>

          <div class="actions">
            <button id="runOneBtn">Run Plugin</button>
            <button id="runAllBtn" class="secondary">Run All Plugins</button>
            <button id="refreshBtn" class="secondary">Refresh Live Results</button>
            <button id="liveBtn" class="secondary">Open Live Page</button>
          </div>

          <div id="status" class="status">Ready.</div>
        </div>

        <div>
          <strong>Plugins</strong>
          <ul id="pluginList" class="list"></ul>
        </div>
      </div>

      <div class="result"><pre id="result">Waiting for run...</pre></div>
    </div>
  </div>

  <script>
    const targetEl = document.getElementById('target');
    const pluginEl = document.getElementById('plugin');
    const passwordEl = document.getElementById('password');
    const timeoutEl = document.getElementById('timeout');
    const runOneBtn = document.getElementById('runOneBtn');
    const runAllBtn = document.getElementById('runAllBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const liveBtn = document.getElementById('liveBtn');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const pluginListEl = document.getElementById('pluginList');

    function setStatus(text, ok = true) {
      statusEl.textContent = text;
      statusEl.className = ok ? 'status ok' : 'status error';
    }

    function getPayload(runAll = false) {
      return {
        plugin: pluginEl.value,
        target: targetEl.value.trim(),
        password: passwordEl.value,
        timeout_seconds: Number(timeoutEl.value) || 3,
        run_all: runAll
      };
    }

    async function runPlugins(runAll) {
      setStatus('Running plugin(s)...', true);
      const res = await fetch('/api/plugins/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getPayload(runAll))
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus('Request failed', false);
      } else {
        setStatus('Run complete', true);
      }
      resultEl.textContent = JSON.stringify(data, null, 2);
    }

    async function refreshLive() {
      const res = await fetch('/api/plugins/results');
      const data = await res.json();
      resultEl.textContent = JSON.stringify(data, null, 2);
      setStatus('Live results refreshed', true);
    }

    async function loadPlugins() {
      const res = await fetch('/api/plugins/list');
      const data = await res.json();

      pluginEl.innerHTML = '';
      pluginListEl.innerHTML = '';
      for (const name of data.plugins || []) {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        pluginEl.appendChild(option);

        const item = document.createElement('li');
        const desc = (data.descriptions && data.descriptions[name]) || '';
        item.textContent = `${name} — ${desc}`;
        pluginListEl.appendChild(item);
      }
      setStatus('Plugins loaded', true);
    }

    runOneBtn.addEventListener('click', () => runPlugins(false).catch(err => setStatus(String(err), false)));
    runAllBtn.addEventListener('click', () => runPlugins(true).catch(err => setStatus(String(err), false)));
    refreshBtn.addEventListener('click', () => refreshLive().catch(err => setStatus(String(err), false)));
    liveBtn.addEventListener('click', () => window.open('/live', '_blank'));

    targetEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') runOneBtn.click();
    });

    loadPlugins().then(refreshLive).catch(err => setStatus(String(err), false));
    setInterval(() => {
      refreshLive().catch(() => {});
    }, 5000);
  </script>
</body>
</html>
